<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小铁船海鲜甄选商城</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <i class="bi bi-anchor"></i>
          <span class="logo-text">小铁船海鲜</span>
        </div>
        <nav class="main-nav">
          <a href="#" class="nav-item active" data-page="home">
            <i class="bi bi-house"></i> 首页
          </a>
          <a href="#" class="nav-item" data-page="cart">
            <i class="bi bi-cart3"></i> 购物车
            <span class="badge" id="cartBadge" style="display:none">0</span>
          </a>
          <a href="#" class="nav-item" data-page="orders">
            <i class="bi bi-receipt"></i> 我的订单
          </a>
        </nav>
        <div class="header-contact">
          <i class="bi bi-telephone"></i>
          <span id="headerPhone">联系电话</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <div class="container">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="搜索海鲜商品...">
        <button id="searchBtn"><i class="bi bi-search"></i></button>
      </div>
    </div>
  </div>

  <!-- 公告 -->
  <div class="announcement" id="announcement" style="display:none">
    <div class="container">
      <i class="bi bi-megaphone"></i>
      <span id="announcementText"></span>
    </div>
  </div>

  <!-- 首页内容 -->
  <main class="main-content" id="pageHome">
    <div class="container">
      <!-- 商品列表 -->
      <div class="products-grid" id="productsGrid">
        <!-- 商品卡片将通过 JS 动态生成 -->
      </div>
      <div class="loading" id="loadingProducts" style="display:none">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
      <div class="empty-state" id="emptyProducts" style="display:none">
        <i class="bi bi-box"></i>
        <p>暂无商品</p>
      </div>
    </div>
  </main>

  <!-- 购物车页面 -->
  <div class="page-content" id="pageCart" style="display:none">
    <div class="container">
      <h3 class="page-title"><i class="bi bi-cart3"></i> 我的购物车</h3>
      <div class="cart-list" id="cartList">
        <!-- 购物车商品将通过 JS 动态生成 -->
      </div>
      <div class="empty-state" id="emptyCart" style="display:none">
        <i class="bi bi-cart-x"></i>
        <p>购物车是空的</p>
        <a href="#" class="btn btn-primary" onclick="showPage('home')">去逛逛</a>
      </div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-summary">
          <span>共 <strong id="cartTotalCount">0</strong> 件商品</span>
          <span class="cart-total">合计: <strong>¥<span id="cartTotalAmount">0</span></strong></span>
        </div>
        <button class="btn btn-success btn-checkout" onclick="goCheckout()">
          去结算
        </button>
      </div>
    </div>
  </div>

  <!-- 订单页面 -->
  <div class="page-content" id="pageOrders" style="display:none">
    <div class="container">
      <h3 class="page-title"><i class="bi bi-receipt"></i> 我的订单</h3>
      
      <!-- 订单状态筛选 -->
      <div class="order-filter-tabs" style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm filter-tab active" data-filter="all" onclick="filterOrders('all')">
          全部订单
        </button>
        <button class="btn btn-outline-primary btn-sm filter-tab" data-filter="pending" onclick="filterOrders('pending')">
          待付款
        </button>
        <button class="btn btn-outline-primary btn-sm filter-tab" data-filter="paid" onclick="filterOrders('paid')">
          待发货
        </button>
        <button class="btn btn-outline-primary btn-sm filter-tab" data-filter="shipped" onclick="filterOrders('shipped')">
          已发货
        </button>
        <button class="btn btn-outline-primary btn-sm filter-tab" data-filter="completed" onclick="filterOrders('completed')">
          已完成
        </button>
      </div>
      
      <div class="order-list" id="orderList">
        <!-- 订单卡片将通过 JS 动态生成 -->
      </div>
      <div class="empty-state" id="emptyOrders" style="display:none">
        <i class="bi bi-inbox"></i>
        <p>暂无订单</p>
        <a href="#" class="btn btn-primary" onclick="showPage('home')">去购物</a>
      </div>
    </div>
  </div>

  <!-- 商品详情弹窗 -->
  <div class="modal" id="productModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">商品详情</h5>
          <button type="button" class="btn-close" onclick="closeProductModal()">×</button>
        </div>
        <div class="modal-body" id="productModalBody">
          <!-- 商品详情将通过 JS 动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 购买弹窗 -->
  <div class="modal" id="buyModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-bag"></i> 选择购买</h5>
          <button type="button" class="btn-close" onclick="closeBuyModal()">×</button>
        </div>
        <div class="modal-body">
          <!-- 商品信息 -->
          <div class="buy-product-info" id="buyProductInfo"></div>
          
          <!-- 规格选择 -->
          <div class="spec-section" id="specSection" style="display:none;">
            <div class="spec-label">请选择规格:</div>
            <div class="spec-options" id="specOptions"></div>
          </div>

          <!-- 数量选择 -->
          <div class="quantity-section">
            <div class="quantity-label">购买数量:</div>
            <div class="quantity-control">
              <button class="qty-btn" onclick="changeQty(-1)">-</button>
              <input type="number" id="buyQty" value="1" min="1" readonly>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>

          <!-- 总计 -->
          <div class="buy-total">
            <span>合计金额:</span>
            <span class="total-price">¥<span id="buyTotalPrice">0</span></span>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" onclick="addToCart()">
            <i class="bi bi-cart-plus"></i> 加入购物车
          </button>
          <button type="button" class="btn btn-primary" onclick="directBuy()">
            <i class="bi bi-lightning"></i> 立即购买
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 结算弹窗 -->
  <div class="modal" id="checkoutModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-credit-card"></i> 确认订单</h5>
          <button type="button" class="btn-close" onclick="closeCheckout()">×</button>
        </div>
        <div class="modal-body">
          <div class="checkout-items" id="checkoutItems"></div>
          
          <div class="checkout-form">
            <div class="form-group">
              <label><i class="bi bi-phone"></i> 手机号码 <span class="required">*</span></label>
              <input type="tel" id="checkoutPhone" placeholder="请输入手机号码" maxlength="11">
            </div>
            <div class="form-group">
              <label><i class="bi bi-person"></i> 收货人姓名</label>
              <input type="text" id="checkoutName" placeholder="请输入收货人姓名">
            </div>
            <div class="form-group">
              <label><i class="bi bi-geo-alt"></i> 收货地址</label>
              <input type="text" id="checkoutAddress" placeholder="请输入详细地址">
            </div>
            <div class="form-group">
              <label><i class="bi bi-chat-left-text"></i> 备注</label>
              <textarea id="checkoutRemark" placeholder="备注信息（选填）" rows="2"></textarea>
            </div>
          </div>

          <div class="checkout-summary">
            <div class="summary-row">
              <span>商品件数:</span>
              <span id="checkoutCount">0 件</span>
            </div>
            <div class="summary-row total">
              <span>订单总额:</span>
              <span>¥<span id="checkoutTotal">0</span></span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary btn-lg btn-block" onclick="submitCheckout()">
            提交订单
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 支付弹窗 -->
  <div class="modal" id="payModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-qr-code"></i> 选择支付方式</h5>
          <button type="button" class="btn-close" onclick="closePayModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="pay-order-info">
            订单号: <strong id="payOrderId"></strong>
            <br>
            应付金额: <span class="text-danger">¥<strong id="payAmount"></strong></span>
          </div>

          <div class="pay-methods">
            <div class="pay-method active" data-method="alipay" onclick="selectPayMethod('alipay')">
              <i class="bi bi-alipay"></i>
              <span>支付宝</span>
            </div>
            <div class="pay-method" data-method="wechat" onclick="selectPayMethod('wechat')">
              <i class="bi bi-wechat"></i>
              <span>微信支付</span>
            </div>
          </div>

          <div class="pay-qr-container">
            <div class="pay-qr" id="payQrCode"></div>
            <p class="pay-hint">请使用<span id="payMethodName">支付宝</span>扫描二维码支付</p>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success btn-lg btn-block" onclick="confirmPay()">
            <i class="bi bi-check-circle"></i> 我已支付
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 订单详情弹窗 -->
  <div class="modal" id="orderDetailModal">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-receipt"></i> 订单详情</h5>
          <button type="button" class="btn-close" onclick="closeOrderDetail()">×</button>
        </div>
        <div class="modal-body" id="orderDetailBody">
          <!-- 订单详情将通过 JS 动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 物流查询弹窗 -->
  <div class="modal" id="trackingModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-truck"></i> 物流轨迹</h5>
          <button type="button" class="btn-close" onclick="closeTrackingModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="tracking-info" style="background:#f8f9fa;padding:15px;border-radius:8px;margin-bottom:20px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;">
              <span>快递公司：<strong id="trackingCompany">-</strong></span>
              <span>运单号：<strong id="trackingNo">-</strong></span>
            </div>
            <div style="font-size:12px;color:#666;">订单号：<span id="trackingOrderId">-</span></div>
          </div>
          <div class="tracking-timeline" id="trackingTimeline" style="max-height:350px;overflow-y:auto;">
            <!-- 物流轨迹动态加载 -->
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeTrackingModal()">关闭</button>
          <button type="button" class="btn btn-primary" onclick="refreshTracking()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-copyright">
        <p>© 2024 小铁船海鲜甄选商城 版权所有</p>
      </div>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
